<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../style/super-admin.css">
    <link rel="stylesheet" href="../style/data-admin.css">
</head>
<body>
    <div class="sidebar">
        <div class="profile">
            <img src="/image/image-removebg-preview.png" alt="User Avatar" class="logo"/>
            <div class="profile-info">
                <h1>Super Admin</h1>
                <p>Hisyam-Ganz</p>
            </div>
        </div>
        <ul>
            <li><a class="dash" href="index.html"><i class='bx bx-cool' ></i> Dashboard</a></li>
            <li class="has-submenu">
                <a class="dash" href="#"><i class='bx bx-tired' ></i> Menu Buku<i class="fas fa-chevron-right arrow"></i></a>
                <ul class="submenu">
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'books.html'"><i class='bx bxs-meh-alt' ></i> Books</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'publisher.html'"><i class='bx bxs-laugh' ></i> Publisher</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'author.html'"><i class='bx bxs-cool' ></i> Author</a></li>
                </ul>
            </li>
            <li><a class="dash" href="anggota.html"><i class='bx bx-wink-tongue' ></i> Member</a></li>
            <li><a class="dash" href="data-admim.html"><i class='bx bx-wink-smile' ></i> Employee</a></li>
            <li class="has-submenu">
                <a class="dash" href="#"><i class='bx bx-sleepy' ></i> Menu Report<i class="fas fa-chevron-right arrow"></i></a>
                <ul class="submenu">
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'books.html'"><i class="fas fa-users"></i> Report</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'publisher.html'"><i class="fas fa-users"></i> Report</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'author.html'"><i class="fas fa-users"></i> Report</a></li>
                </ul>
            </li>
        </ul>
        <div style="padding-left: 40px; margin-top: 190px;">
            <button onclick="window.location.href = '/auth/login.html'" class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="container">
       <div class="admin">
        <h1>Edit Profile</h1>
        <form>
            <div class="photo-upload">
                <img class="profile-photo" id="profilePhoto">
                <label for="photoUpload" class="upload-btn">Upload</label>
                <input type="file" id="photoUpload" accept="image/*">
            </div>
            
            <div class="form-admin">
            <label for="nama">Name:</label>
            <input type="text" id="nama" name="nama" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="FullName">Full Name:</label>
            <input type="text" id="FullName" name="FullName" required>

            <label for="NIK">NIK:</label>
            <input type="text" id="NIK" name="NIK" required>

            <label for="role">Role:</label>
            <input type="text" id="Role" value="Super Admin" name="Role" readonly required>

            <label for="Phone">Phone:</label>
            <input type="text" id="Phone" name="Phone" required>

            <label for="Gender">Gender:</label>
            <select id="Gender" name="Gender">
                <option value="Laki-Laki">Laki-Laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
            
            <label for="Address">Address:</label>
            <input type="text" id="Address" name="Address" required>
            </div>
            
            <!-- <button type="submit">Save</button> -->
        </form>
        
        <button type="submit">Save</button>
       </div>

    <script src="../config/dashboard.js"></script>
    <script src="../config/data-admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        // Sidebar collapse functionality
        const menuItems = document.querySelectorAll('.has-submenu');

        menuItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const submenu = this.querySelector('.submenu');
                const arrow = this.querySelector('.arrow');
                
                submenu.classList.toggle('active');
                arrow.classList.toggle('active');
                
                // Close other submenus
                const otherSubmenus = document.querySelectorAll('.submenu');
                const otherArrows = document.querySelectorAll('.arrow');
                
                otherSubmenus.forEach(menu => {
                    if (menu !== submenu && menu.classList.contains('active')) {
                        menu.classList.remove('active');
                    }
                });
                
                otherArrows.forEach(arr => {
                    if (arr !== arrow && arr.classList.contains('active')) {
                        arr.classList.remove('active');
                    }
                });
            });
        });
    });

</script>
</body>
</html>
