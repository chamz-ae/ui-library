<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Super Admin Library</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="../style/peminjaman.css">
    <link rel="stylesheet" href="../style/super-admin.css">
</head>
<body>
    <div class="sidebar">
        <div class="profile">
            <a href="../super-admin/data-admim.html"><img src="/image/image-removebg-preview.png" alt="User Avatar" class="logo"/></a>
            <div class="profile-info">
                <h1>Super Admin</h1>
                <p>Hisyam-Ganz</p>
            </div>
        </div>
        <ul>
            <li><a class="dash" href="index.html"><i class='bx bx-cool' ></i> Dashboard</a></li>
            <li><a class="dash active" href="peminjaman.html"><i class='bx bx-meh-alt'></i> Loan</a></li>
            <li class="has-submenu">
                <a class="dash" href="#"><i class='bx bx-tired' ></i> Menu Buku<i class="fas fa-chevron-right arrow"></i></a>
                <ul class="submenu">
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'books.html'"><i class='bx bxs-meh-alt' ></i> Books</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'publisher.html'"><i class='bx bxs-laugh' ></i> Publisher</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'author.html'"><i class='bx bxs-cool' ></i> Author</a></li>
                </ul>
            </li>
            <li><a class="dash" href="anggota.html"><i class='bx bx-wink-tongue' ></i> Member</a></li>
            <li><a class="dash" href="employee.html"><i class='bx bx-wink-smile' ></i> Employee</a></li>
            <li class="has-submenu">
                <a class="dash" href="#"><i class='bx bx-sleepy' ></i> Menu Report<i class="fas fa-chevron-right arrow"></i></a>
                <ul class="submenu">
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'books.html'"><i class="fas fa-users"></i> Report</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'publisher.html'"><i class="fas fa-users"></i> Report</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'author.html'"><i class="fas fa-users"></i> Report</a></li>
                </ul>
            </li>
        </ul>
        <div style="padding-left: 40px; margin-top:150px;">
            <button onclick="window.location.href = '/auth/login.html'" class="logout-btn" id="logoutBtn" >Logout</button>
        </div>

    </div>
    <!-- Search -->
    <div class="search-container">
        <form class="search" action="#">
            <input type="text" placeholder="🔍 Search.." name="search" >
        </form>
    </div>
    <div class="container">

        <!-- Product List -->
        <main class="product-section">
            <div class="product-grid" id="productList">
                <!-- Produk akan dimuat disini melalui JS -->
            </div>
        </main>

        <!-- Cart Section -->
        <aside class="cart-section">
            <div class="cart-header">
                <h3>Keranjang</h3>
                <!-- <p>Jumlah Item: <span id="cartCount">0</span></p> -->
            </div>
            <div id="cartItems" class="cart-items">
                <!-- Item keranjang tampilkan disini -->
            </div>
            <div class="cart-footer">
                <h4>Total Items: <span id="cartTotal">0</span></h4>
                <button class="checkout-btn" id="checkoutButton">Checkout</button>
            </div>
        </aside>
    </div>

    <script src="../config/dashboard.js"></script>
    <script src="../config/peminjaman.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        // Sidebar collapse functionality
        const menuItems = document.querySelectorAll('.has-submenu');

        menuItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const submenu = this.querySelector('.submenu');
                const arrow = this.querySelector('.arrow');
                
                submenu.classList.toggle('active');
                arrow.classList.toggle('active');
                
                // Close other submenus
                const otherSubmenus = document.querySelectorAll('.submenu');
                const otherArrows = document.querySelectorAll('.arrow');
                
                otherSubmenus.forEach(menu => {
                    if (menu !== submenu && menu.classList.contains('active')) {
                        menu.classList.remove('active');
                    }
                });
                
                otherArrows.forEach(arr => {
                    if (arr !== arrow && arr.classList.contains('active')) {
                        arr.classList.remove('active');
                    }
                });
            });
        });
    });

</script>
</body>
</html>
