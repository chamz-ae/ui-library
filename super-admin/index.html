    <div class="main-content">
        <div class="header">
            <div class="filter-container">
                <div class="filter-section">
                  <div class="filter-title">Filter Date</div>
                  
                  <div class="filter-type">
                    <label>
                      <input type="radio" name="filter-type" value="range" checked onchange="showFilter('range')">
                      Date Range
                    </label>
                    <label>
                      <input type="radio" name="filter-type" value="month" onchange="showFilter('month')">
                      Month
                    </label>
                    <label>
                      <input type="radio" name="filter-type" value="date" onchange="showFilter('date')">
                      Specific Date
                    </label>
                  </div>
            
                  <div id="range-filter" class="active-filter show">
                    <div class="filter-options">
                      <input type="date" class="date-input" placeholder="Tanggal Awal">
                      <span>Until</span>
                      <input type="date" class="date-input" placeholder="Tanggal Akhir">
                      <button class="filter-button"> Filter</button>
                    </div>
                  </div>
            
                  <div id="month-filter" class="active-filter">
                    <div class="filter-options">
                      <select class="month-select">
                        <option value="">Select Month</option>
                        <option value="1">Januari</option>
                        <option value="2">Februari</option>
                        <option value="3">Maret</option>
                        <option value="4">April</option>
                        <option value="5">Mei</option>
                        <option value="6">Juni</option>
                        <option value="7">Juli</option>
                        <option value="8">Agustus</option>
                        <option value="9">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                      </select>
                      <button class="filter-button"> Filter</button>
                    </div>
                  </div>
            
                  <div id="date-filter" class="active-filter">
                    <div class="filter-options">
                      <input type="date" class="date-input">
                      <button class="filter-button"> Filter</button>
                    </div>
                  </div>
                </div>
              </div>
        </div>
        <div class="card-container">
            <div class="card">
                <h3>Most borrowed books</h3>
                <p id="totalBooks">223</p>
            </div>
            <div class="card">
                <h3>Least borrowed books</h3>
                <p id="activeMembers">233</p>
            </div>
            <div class="card">
                <h3>Broken books</h3>
                <p id="todayLoans">803</p>
            </div>
            <div class="card">
                <h3>Missing books</h3>
                <p id="overdueBooks">223</p>
            </div>
        </div>
    </div>

    <script src="../config/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        // Sidebar collapse functionality
        const menuItems = document.querySelectorAll('.has-submenu');

        menuItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const submenu = this.querySelector('.submenu');
                const arrow = this.querySelector('.arrow');
                
                submenu.classList.toggle('active');
                arrow.classList.toggle('active');
                
                // Close other submenus
                const otherSubmenus = document.querySelectorAll('.submenu');
                const otherArrows = document.querySelectorAll('.arrow');
                
                otherSubmenus.forEach(menu => {
                    if (menu !== submenu && menu.classList.contains('active')) {
                        menu.classList.remove('active');
                    }
                });
                
                otherArrows.forEach(arr => {
                    if (arr !== arrow && arr.classList.contains('active')) {
                        arr.classList.remove('active');
                    }
                });
            });
        });
    });

</script>
</body>
