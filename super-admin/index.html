<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style/super-admin.css">
</head>
<body>
    <div class="sidebar">
        <div class="profile">
            <a href="../super-admin/data-admim.html"><img src="/image/image-removebg-preview.png" alt="User Avatar" class="logo"/></a>
            <div class="profile-info">
                <h1>Super Admin</h1>
                <p>Hisyam-Ganz</p>
            </div>
        </div>
        <ul>
            <li><a class="dash active" href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="has-submenu">
                <a class="dash" href="#"><i class="fas fa-book" ></i> Menu Buku<i class="fas fa-chevron-right arrow"></i></a>
                <ul class="submenu">
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'books.html'"><i class="fas fa-users"></i> Books</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'publisher.html'"><i class="fas fa-users"></i> Publisher</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'author.html'"><i class="fas fa-users"></i> Author</a></li>
                </ul>
            </li>
            <li><a class="dash" href="anggota.html"><i class="fas fa-users"></i> Member</a></li>
            <li class="has-submenu">
                <a class="dash" href="#"><i class="fas fa-chart-bar" ></i> Menu Report<i class="fas fa-chevron-right arrow"></i></a>
                <ul class="submenu">
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'books.html'"><i class="fas fa-users"></i> Report</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'publisher.html'"><i class="fas fa-users"></i> Report</a></li>
                    <li style="cursor: pointer;"><a onclick="window.location.href = 'author.html'"><i class="fas fa-users"></i> Report</a></li>
                </ul>
            </li>
            <!-- <li><a class="dash" href="data-admim.html"><i class="fas fa-cog"></i> Admin Data</a></li> -->
        </ul>
        <div style="padding-left: 40px; margin-top:210px;">
            <button onclick="window.location.href = '/auth/login.html'" class="logout-btn" id="logoutBtn" >Logout</button>
        </div>

    </div>
    <div class="main-content">
        <div class="header">
            <h2>Date : 12 November 2024</h2>
            <!-- <a href="login.html"> <button class="logout-btn" id="logoutBtn" href="login.html" >Logout</button></a> -->
        </div>
        <div class="card-container">
            <div class="card">
                <h3>Most borrowed books</h3>
                <p id="totalBooks">223</p>
            </div>
            <div class="card">
                <h3>Least borrowed books</h3>
                <p id="activeMembers">233</p>
            </div>
            <div class="card">
                <h3>Broken books</h3>
                <p id="todayLoans">803</p>
            </div>
            <div class="card">
                <h3>Missing books</h3>
                <p id="overdueBooks">223</p>
            </div>
        </div>
    </div>

    <script src="../config/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
        // Sidebar collapse functionality
        const menuItems = document.querySelectorAll('.has-submenu');

        menuItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const submenu = this.querySelector('.submenu');
                const arrow = this.querySelector('.arrow');
                
                submenu.classList.toggle('active');
                arrow.classList.toggle('active');
                
                // Close other submenus
                const otherSubmenus = document.querySelectorAll('.submenu');
                const otherArrows = document.querySelectorAll('.arrow');
                
                otherSubmenus.forEach(menu => {
                    if (menu !== submenu && menu.classList.contains('active')) {
                        menu.classList.remove('active');
                    }
                });
                
                otherArrows.forEach(arr => {
                    if (arr !== arrow && arr.classList.contains('active')) {
                        arr.classList.remove('active');
                    }
                });
            });
        });
    });

</script>
</body>
</html>
