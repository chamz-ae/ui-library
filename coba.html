<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapsible Sidebar Menu</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
}

.sidebar {
    width: 250px;
    background-color: #f9f9f9;
    border-right: 1px solid #e0e0e0;
    position: absolute;
    height: 100%;
    transition: width 0.3s ease;
    overflow: hidden;
}

.sidebar.collapsed {
    width: 60px;
}

.menu {
    padding: 10px;
}

.menu-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    color: #d50000;
    cursor: pointer;
}

.menu-title .icon {
    font-size: 20px;
    margin-right: 8px;
}

.menu-title .arrow {
    font-size: 12px;
}

.menu-items {
    list-style: none;
    margin-top: 10px;
    padding-left: 15px;
    border-left: 2px solid #d50000;
    display: none;
    transition: display 0.3s;
}

.menu-items li {
    margin-bottom: 10px;
    cursor: pointer;
    color: #333;
    position: relative;
    padding-left: 15px;
}

.menu-items li::before {
    content: "○";
    position: absolute;
    left: 0;
    top: 0;
    font-size: 12px;
    color: #d50000;
}

/* Collapsible button */
.collapse-button {
    position: absolute;
    top: 10px;
    left: 260px;
    background-color: #d50000;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-size: 20px;
    transition: left 0
}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="menu">
            <div class="menu-title" onclick="toggleMenu()">
                <span class="icon">📊</span>
                <span>Laporan</span>
                <span class="arrow">▼</span>
            </div>
            <ul class="menu-items">
                <li>Laba Rugi</li>
                <li>Transaksi Kasir</li>
                <li>Transaksi Pesan Antar</li>
                <li>Penjualan Produk</li>
            </ul>
        </div>
    </div>

    <button class="collapse-button" onclick="toggleSidebar()">☰</button>

    <script>
        function toggleMenu() {
    const menuItems = document.querySelector('.menu-items');
    const arrow = document.querySelector('.menu-title .arrow');
    if (menuItems.style.display === 'block') {
        menuItems.style.display = 'none';
        arrow.textContent = '▼';
    } else {
        menuItems.style.display = 'block';
        arrow.textContent = '▲';
    }
}

function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('collapsed');
}

    </script>

</body>
</html>
